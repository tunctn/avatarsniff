name: Release

# Publishes the avatarsniff lib to npm when a v* tag is pushed.
# Tokenless via OIDC trusted publishing - configure the trusted publisher at
# npmjs.com -> avatarsniff -> Settings -> Trusted Publisher (GitHub Actions:
# tunctn / avatarsniff / release.yml). No NPM_TOKEN secret needed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Same gates as CI, against the tagged commit.
      - run: pnpm --filter avatarsniff typecheck
      - run: pnpm --filter avatarsniff coverage
      - run: pnpm --filter avatarsniff build
      - run: pnpm --filter avatarsniff attw
      - run: pnpm --filter avatarsniff publish --no-git-checks --access public --provenance
